<be:pageRenderer />
<be:moduleLayout>
    <f:section name="Content">
        <h1><f:translate key="LLL:EXT:mai_consent/Resources/Private/Language/locallang.xlf:module.title" /></h1>

        <f:if condition="{stats}">
            <f:then>
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th><f:translate key="LLL:EXT:mai_consent/Resources/Private/Language/locallang.xlf:stats.category" /></th>
                            <th><f:translate key="LLL:EXT:mai_consent/Resources/Private/Language/locallang.xlf:stats.total" /></th>
                            <th><f:translate key="LLL:EXT:mai_consent/Resources/Private/Language/locallang.xlf:stats.accepted" /></th>
                            <th><f:translate key="LLL:EXT:mai_consent/Resources/Private/Language/locallang.xlf:stats.rate" /></th>
                        </tr>
                    </thead>
                    <tbody>
                        <f:for each="{stats}" as="row">
                            <tr>
                                <td>{row.category.title}</td>
                                <td>{row.total}</td>
                                <td>{row.accepted}</td>
                                <td>{row.rate} %</td>
                            </tr>
                        </f:for>
                    </tbody>
                </table>
            </f:then>
            <f:else>
                <p class="text-muted">
                    <f:translate key="LLL:EXT:mai_consent/Resources/Private/Language/locallang.xlf:stats.empty" />
                </p>
            </f:else>
        </f:if>
    </f:section>
</be:moduleLayout>

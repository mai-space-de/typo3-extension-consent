<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers" data-namespace-typo3-fluid="true">

<f:flashMessages queueIdentifier="mai_consent.flashmessages" />

<div class="module-body">

    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1>Consent Category Management</h1>
                <a href="{statisticsUri}" class="btn btn-default">
                    View Statistics
                </a>
            </div>
        </div>
    </div>

    <!-- Category list -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Categories</h2>
                </div>
                <div class="card-body p-0">
                    <f:if condition="{categories}">
                        <f:then>
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Description</th>
                                        <th>Essential</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <f:for each="{categories}" as="category">
                                        <tr>
                                            <td>
                                                <strong>{category.name}</strong>
                                            </td>
                                            <td>{category.description}</td>
                                            <td>
                                                <f:if condition="{category.isEssential}">
                                                    <f:then>
                                                        <span class="badge badge-success">Yes</span>
                                                    </f:then>
                                                    <f:else>
                                                        <span class="badge badge-default">No</span>
                                                    </f:else>
                                                </f:if>
                                            </td>
                                            <td>
                                                <!-- Edit form (inline) -->
                                                <button
                                                    type="button"
                                                    class="btn btn-sm btn-default"
                                                    data-bs-toggle="collapse"
                                                    data-bs-target="#edit-category-{category.uid}"
                                                    aria-expanded="false"
                                                >
                                                    Edit
                                                </button>

                                                <!-- Delete form -->
                                                <form method="post" action="{f:be.uri(route: 'mai_consent.deleteCategory')}" class="d-inline">
                                                    <input type="hidden" name="uid" value="{category.uid}" />
                                                    <button
                                                        type="submit"
                                                        class="btn btn-sm btn-danger"
                                                        onclick="return confirm('Delete category &quot;{category.name}&quot;? This cannot be undone.');"
                                                    >
                                                        Delete
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                        <tr id="edit-category-{category.uid}" class="collapse">
                                            <td colspan="4">
                                                <form method="post" action="{f:be.uri(route: 'mai_consent.updateCategory')}" class="p-3 bg-light">
                                                    <input type="hidden" name="uid" value="{category.uid}" />
                                                    <div class="row g-3">
                                                        <div class="col-md-4">
                                                            <label class="form-label" for="edit-name-{category.uid}">Name *</label>
                                                            <input
                                                                type="text"
                                                                id="edit-name-{category.uid}"
                                                                name="name"
                                                                class="form-control"
                                                                value="{category.name}"
                                                                required
                                                            />
                                                        </div>
                                                        <div class="col-md-6">
                                                            <label class="form-label" for="edit-description-{category.uid}">Description</label>
                                                            <textarea
                                                                id="edit-description-{category.uid}"
                                                                name="description"
                                                                class="form-control"
                                                                rows="2"
                                                            >{category.description}</textarea>
                                                        </div>
                                                        <div class="col-md-2 d-flex align-items-end">
                                                            <div class="form-check">
                                                                <input
                                                                    type="checkbox"
                                                                    id="edit-essential-{category.uid}"
                                                                    name="is_essential"
                                                                    class="form-check-input"
                                                                    value="1"
                                                                    <f:if condition="{category.isEssential}">checked="checked"</f:if>
                                                                />
                                                                <label class="form-check-label" for="edit-essential-{category.uid}">
                                                                    Essential
                                                                </label>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div class="mt-3">
                                                        <button type="submit" class="btn btn-primary btn-sm">Save changes</button>
                                                    </div>
                                                </form>
                                            </td>
                                        </tr>
                                    </f:for>
                                </tbody>
                            </table>
                        </f:then>
                        <f:else>
                            <div class="p-3 text-muted">
                                No consent categories defined yet. Create the first one below.
                            </div>
                        </f:else>
                    </f:if>
                </div>
            </div>
        </div>
    </div>

    <!-- Create new category -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Add New Category</h2>
                </div>
                <div class="card-body">
                    <form method="post" action="{f:be.uri(route: 'mai_consent.createCategory')}">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label" for="new-category-name">Name *</label>
                                <input
                                    type="text"
                                    id="new-category-name"
                                    name="name"
                                    class="form-control"
                                    placeholder="e.g. Analytics"
                                    required
                                />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="new-category-description">Description</label>
                                <textarea
                                    id="new-category-description"
                                    name="description"
                                    class="form-control"
                                    rows="2"
                                    placeholder="Describe what this category covers..."
                                ></textarea>
                            </div>
                            <div class="col-md-2 d-flex align-items-end pb-1">
                                <div class="form-check">
                                    <input
                                        type="checkbox"
                                        id="new-category-essential"
                                        name="is_essential"
                                        class="form-check-input"
                                        value="1"
                                    />
                                    <label class="form-check-label" for="new-category-essential">
                                        Essential
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary">Add Category</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</html>
